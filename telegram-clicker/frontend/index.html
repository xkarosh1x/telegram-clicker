<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #fff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 24px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .coin {
            font-size: 80px;
            margin: 10px 0;
            display: block;
        }
        .balance {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }
        .click-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle at 30% 30%, #f7971e, #ffd200);
            font-size: 80px;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 8px 0 #b37b00, 0 10px 30px rgba(255, 210, 0, 0.3);
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .click-btn:active {
            transform: scale(0.92);
            box-shadow: 0 4px 0 #b37b00;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }
        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 16px;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-top: 5px;
        }
        .boost-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px 0;
        }
        .boost-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .boost-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #ffd200;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }
        #toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Загрузка данных...</p>
    </div>
    
    <div class="container" id="game" style="display:none">
        <span class="coin">🪙</span>
        <div class="balance" id="balance">0</div>
        
        <button class="click-btn" id="clickBtn">👆</button>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">💪 Мощность</div>
                <div class="stat-value" id="clickPower">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">📊 Всего кликов</div>
                <div class="stat-value" id="totalClicks">0</div>
            </div>
        </div>
        
        <button class="boost-btn" id="boost1">⚡ Улучшить клик (+1) - 50 🪙</button>
        <button class="boost-btn" id="boost2">🔥 Супер-буст (+5) - 200 🪙</button>
        <button class="boost-btn" id="resetBtn" style="background: #e74c3c; margin-top: 10px;">🔄 Сбросить прогресс</button>
    </div>
</div>

<div id="toast"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    // --- Конфигурация ---
    const API_URL = 'https://твой-проект.vercel.app/api'; // Замени на свой Vercel URL
    
    // --- Состояние ---
    let state = {
        balance: 0,
        clickPower: 1,
        totalClicks: 0
    };
    let userId = tg.initDataUnsafe?.user?.id || 'anonymous';
    let isSaving = false;
    
    // --- DOM элементы ---
    const loading = document.getElementById('loading');
    const game = document.getElementById('game');
    const balanceEl = document.getElementById('balance');
    const clickPowerEl = document.getElementById('clickPower');
    const totalClicksEl = document.getElementById('totalClicks');
    const clickBtn = document.getElementById('clickBtn');
    const toast = document.getElementById('toast');
    
    // --- Вспомогательные функции ---
    function showToast(msg, duration = 2000) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), duration);
    }
    
    // --- API функции ---
    async function loadData() {
        try {
            const res = await fetch(`${API_URL}?userId=${userId}`);
            if (!res.ok) throw new Error('Ошибка загрузки');
            const data = await res.json();
            state.balance = data.balance || 0;
            state.clickPower = data.clickPower || 1;
            state.totalClicks = data.totalClicks || 0;
            updateUI();
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            // Загружаем из localStorage если API недоступен
            const saved = localStorage.getItem(`clicker_${userId}`);
            if (saved) {
                const parsed = JSON.parse(saved);
                state = parsed;
                updateUI();
                showToast('Загружено из кэша');
            }
        } finally {
            loading.style.display = 'none';
            game.style.display = 'block';
        }
    }
    
    async function saveData() {
        if (isSaving) return;
        isSaving = true;
        
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: userId,
                    balance: state.balance,
                    clickPower: state.clickPower,
                    totalClicks: state.totalClicks
                })
            });
            
            if (!res.ok) throw new Error('Ошибка сохранения');
            
            // Сохраняем в localStorage для кэша
            localStorage.setItem(`clicker_${userId}`, JSON.stringify(state));
            
        } catch (error) {
            console.error('Ошибка сохранения:', error);
            // Сохраняем в localStorage если API недоступен
            localStorage.setItem(`clicker_${userId}`, JSON.stringify(state));
            showToast('Сохранено локально');
        } finally {
            isSaving = false;
        }
    }
    
    // --- UI функции ---
    function updateUI() {
        balanceEl.textContent = state.balance;
        clickPowerEl.textContent = state.clickPower;
        totalClicksEl.textContent = state.totalClicks;
        
        // Обновляем состояние кнопок буста
        document.getElementById('boost1').disabled = state.balance < 50;
        document.getElementById('boost2').disabled = state.balance < 200;
    }
    
    // --- Игровые механики ---
    function handleClick() {
        state.balance += state.clickPower;
        state.totalClicks += 1;
        updateUI();
        
        // Сохраняем с задержкой (debounce)
        clearTimeout(window._saveTimeout);
        window._saveTimeout = setTimeout(saveData, 500);
    }
    
    function buyBoost(cost, powerIncrease) {
        if (state.balance < cost) {
            showToast('❌ Недостаточно монет!');
            return;
        }
        state.balance -= cost;
        state.clickPower += powerIncrease;
        updateUI();
        saveData();
        showToast(`✅ Куплено! +${powerIncrease} к силе клика`);
        
        // Haptic feedback
        if (tg.HapticFeedback) {
            tg.HapticFeedback.impactOccurred('medium');
        }
    }
    
    function resetProgress() {
        if (confirm('Точно сбросить весь прогресс?')) {
            state.balance = 0;
            state.clickPower = 1;
            state.totalClicks = 0;
            updateUI();
            saveData();
            showToast('🔄 Прогресс сброшен');
        }
    }
    
    // --- Инициализация ---
    document.addEventListener('DOMContentLoaded', async () => {
        // Загружаем данные
        await loadData();
        
        // Обработчики событий
        clickBtn.addEventListener('click', handleClick);
        
        // Длинное нажатие для автоклика
        let autoClickInterval;
        clickBtn.addEventListener('mousedown', () => {
            autoClickInterval = setInterval(handleClick, 100);
        });
        clickBtn.addEventListener('mouseup', () => {
            clearInterval(autoClickInterval);
        });
        clickBtn.addEventListener('mouseleave', () => {
            clearInterval(autoClickInterval);
        });
        
        document.getElementById('boost1').addEventListener('click', () => buyBoost(50, 1));
        document.getElementById('boost2').addEventListener('click', () => buyBoost(200, 5));
        document.getElementById('resetBtn').addEventListener('click', resetProgress);
        
        // Сохраняем при закрытии
        tg.onEvent('viewportChanged', () => {
            saveData();
        });
    });
    
    // Сохраняем перед закрытием страницы
    window.addEventListener('beforeunload', saveData);
</script>
</body>
</html>
