<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* === ОБЩИЕ СТИЛИ === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0719;
            --card-bg: rgba(30, 20, 50, 0.85);
            --purple: #9b59b6;
            --purple-dark: #7d3c98;
            --purple-light: #a29bfe;
            --neon-pink: #fd79a8;
            --gold: #fdcb6e;
            --text: #f0e6ff;
            --text-muted: #b8a5d6;
            --shadow: 0 8px 32px rgba(155, 89, 182, 0.3);
            --radius: 20px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background-image: radial-gradient(circle at 10% 20%, rgba(155, 89, 182, 0.1) 0%, transparent 50%);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 24px 20px 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(155, 89, 182, 0.15);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === ХЕДЕР === */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            animation: fadeIn 0.6s ease;
        }

        .level-badge {
            background: linear-gradient(135deg, var(--purple), var(--neon-pink));
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            box-shadow: 0 0 15px rgba(253, 121, 168, 0.3);
            transition: box-shadow 0.3s;
        }

        .daily-bonus {
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(155, 89, 182, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(155, 89, 182, 0.3); }
            50% { box-shadow: 0 0 10px 5px rgba(155, 89, 182, 0.1); }
            100% { box-shadow: 0 0 0 0 rgba(155, 89, 182, 0.3); }
        }

        .daily-bonus:active {
            transform: scale(0.95);
        }

        .daily-bonus.claimed {
            opacity: 0.5;
            pointer-events: none;
            border-color: transparent;
            animation: none;
        }

        /* === КОИН === */
        .coin-section {
            text-align: center;
            margin: 8px 0 12px;
            position: relative;
        }

        .balance {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple-light), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .balance .coin-icon {
            font-size: 40px;
            -webkit-text-fill-color: initial;
            color: var(--gold);
            filter: drop-shadow(0 0 8px rgba(253, 203, 110, 0.4));
            animation: coinFloat 3s ease-in-out infinite;
        }
        @keyframes coinFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .balance.pop {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: 0.15s;
        }

        .click-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle at 30% 30%, var(--purple-light), var(--purple-dark));
            font-size: 72px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.3s;
            box-shadow: 0 0 30px rgba(155, 89, 182, 0.4), inset 0 -6px 0 rgba(0, 0, 0, 0.2);
            margin: 12px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            touch-action: manipulation;
            position: relative;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .click-btn:active {
            transform: scale(0.92) !important;
            box-shadow: 0 0 50px rgba(253, 121, 168, 0.6), inset 0 -2px 0 rgba(0, 0, 0, 0.2);
            animation: none;
        }

        @media (hover: hover) {
            .click-btn:hover .hover-glow {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .hover-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120%;
            height: 120%;
            transform: translate(-50%, -50%) scale(0.8);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(155, 89, 182, 0.4) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s, transform 0.4s;
            pointer-events: none;
            animation: breathe 2s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.7; }
        }

        .click-btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            animation: rippleAnim 0.6s ease-out forwards;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .float-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 20px rgba(253, 121, 168, 0.8);
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -120%) scale(1.3); }
        }

        /* === СТАТИСТИКА === */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 16px 0;
            animation: fadeIn 0.8s ease;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 10px 4px;
            text-align: center;
            border: 1px solid rgba(155, 89, 182, 0.1);
            transition: all 0.3s;
            animation: slideUp 0.5s ease;
        }
        .stat-box:hover {
            background: rgba(155, 89, 182, 0.1);
            transform: translateY(-2px);
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            margin-top: 2px;
            color: var(--text);
            transition: all 0.2s;
        }

        /* === ПРОГРЕСС УРОВНЯ === */
        .level-progress {
            margin: 12px 0 16px;
            animation: fadeIn 0.7s ease;
        }

        .level-progress .info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--purple), var(--neon-pink));
            border-radius: 10px;
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* === ВКЛАДКИ === */
        .tabs {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 4px;
            margin: 16px 0 12px;
            animation: fadeIn 0.9s ease;
        }

        .tab {
            flex: 1;
            min-width: 0;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            white-space: nowrap;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            color: #fff;
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.3);
        }

        /* === КОНТЕНТ ВКЛАДОК === */
        .tab-content {
            display: none;
            width: 100%;
            padding: 0;
            opacity: 0;
            transform: scale(0.9) translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .tab-content.active {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .tab-content.closing {
            display: block;
            opacity: 0;
            transform: scale(0.9) translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* === АНИМАЦИЯ ДЛЯ ЭЛЕМЕНТОВ === */
        .shop-item,
        .achievement {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .shop-item.visible,
        .achievement.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .shop-item,
        .achievement {
            width: 100%;
            box-sizing: border-box;
        }

        /* === МАГАЗИН === */
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 1px solid rgba(155, 89, 182, 0.08);
            transition: all 0.3s;
        }

        .shop-item:active {
            background: rgba(155, 89, 182, 0.15);
            transform: scale(0.98);
        }

        .shop-item-info {
            flex: 1;
            min-width: 0;
        }

        .shop-item-title {
            font-weight: 600;
            font-size: 15px;
        }

        .shop-item-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .shop-item-price {
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 10px rgba(155, 89, 182, 0.2);
            flex-shrink: 0;
        }

        .shop-item-price:active {
            transform: scale(0.94);
        }

        .shop-item-price:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* === ДОСТИЖЕНИЯ === */
        .achievement {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 6px;
            border-left: 4px solid var(--purple);
            transition: all 0.3s;
        }

        .achievement.locked {
            opacity: 0.4;
            border-left-color: #444;
        }

        .achievement-icon {
            font-size: 28px;
            flex-shrink: 0;
        }

        .achievement-info {
            flex: 1;
            min-width: 0;
        }

        .achievement-name {
            font-weight: 600;
            font-size: 14px;
        }

        .achievement-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* === РЕФЕРАЛЫ === */
        .referral-box {
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid rgba(155, 89, 182, 0.1);
            animation: fadeIn 0.5s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .referral-link {
            background: rgba(255, 255, 255, 0.06);
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            word-break: break-all;
            margin: 10px 0;
            cursor: pointer;
            color: var(--text-muted);
            border: 1px dashed rgba(155, 89, 182, 0.2);
            transition: background 0.3s;
            width: 100%;
            box-sizing: border-box;
        }

        .referral-link:active {
            background: rgba(155, 89, 182, 0.15);
        }

        .btn-copy {
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            margin-top: 8px;
            box-shadow: 0 2px 10px rgba(155, 89, 182, 0.2);
            transition: all 0.3s;
        }

        .btn-copy:active {
            transform: scale(0.95);
        }

        /* === TOAST === */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 10, 40, 0.95);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 999;
            border: 1px solid rgba(155, 89, 182, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            text-align: center;
        }

        #toast.show {
            opacity: 1;
        }

        /* === ЛОАДЕР === */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(155, 89, 182, 0.15);
            border-top-color: var(--purple-light);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* === АДАПТИВ === */
        @media (max-width: 380px) {
            .click-btn {
                width: 130px;
                height: 130px;
                font-size: 56px;
            }
            .balance {
                font-size: 38px;
            }
            .balance .coin-icon {
                font-size: 32px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color:var(--text-muted);">Загрузка...</p>
        </div>

        <div class="container" id="game" style="display:none;">
            <!-- Хедер -->
            <div class="header">
                <div class="level-badge" id="levelBadge">🏅 Ур. 1</div>
                <div class="daily-bonus" id="dailyBonus">🎁 Бонус</div>
            </div>

            <!-- Монетка -->
            <div class="coin-section">
                <div class="balance" id="balance">
                    <span id="balanceValue">0</span>
                    <span class="coin-icon">🪙</span>
                </div>
                <button class="click-btn" id="clickBtn">
                    <span class="hover-glow"></span>
                    <span id="coinEmoji">🪙</span>
                </button>
            </div>

            <!-- Статистика -->
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">💪 Сила</div>
                    <div class="stat-value" id="clickPower">1</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">👆 Клики</div>
                    <div class="stat-value" id="totalClicks">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">🤖 Авто</div>
                    <div class="stat-value" id="autoPower">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">👥 Рефы</div>
                    <div class="stat-value" id="refCount">0</div>
                </div>
            </div>

            <!-- Прогресс уровня -->
            <div class="level-progress">
                <div class="info">
                    <span>До следующего уровня</span>
                    <span id="levelProgressText">0 / 100</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="levelProgress" style="width:0%;"></div>
                </div>
            </div>

            <!-- Вкладки -->
            <div class="tabs">
                <button class="tab" data-tab="shop">🛒</button>
                <button class="tab" data-tab="achievements">🏆</button>
                <button class="tab" data-tab="referral">👥</button>
            </div>

            <!-- Магазин -->
            <div class="tab-content" id="tab-shop">
                <div class="shop-item">
                    <div class="shop-item-info">
                        <div class="shop-item-title">⚡ Усиление</div>
                        <div class="shop-item-desc">+1 сила клика</div>
                    </div>
                    <button class="shop-item-price" id="buyPower">50 🪙</button>
                </div>
                <div class="shop-item">
                    <div class="shop-item-info">
                        <div class="shop-item-title">🤖 Автокликер</div>
                        <div class="shop-item-desc">+1 авто-клик/сек</div>
                    </div>
                    <button class="shop-item-price" id="buyAuto">100 🪙</button>
                </div>
                <div class="shop-item">
                    <div class="shop-item-info">
                        <div class="shop-item-title">🚀 Супер-буст</div>
                        <div class="shop-item-desc">+5 силы клика</div>
                    </div>
                    <button class="shop-item-price" id="buySuperBoost">200 🪙</button>
                </div>
                <div class="shop-item">
                    <div class="shop-item-info">
                        <div class="shop-item-title">💎 Мега-буст</div>
                        <div class="shop-item-desc">+25 силы</div>
                    </div>
                    <button class="shop-item-price" id="buyMegaBoost">1000 🪙</button>
                </div>
                <div class="shop-item">
                    <div class="shop-item-info">
                        <div class="shop-item-title">🎨 Скин</div>
                        <div class="shop-item-desc">Золотая монетка</div>
                    </div>
                    <button class="shop-item-price" id="buySkin">500 🪙</button>
                </div>
            </div>

            <!-- Достижения -->
            <div class="tab-content" id="tab-achievements">
                <div id="achievementsList"></div>
            </div>

            <!-- Рефералы -->
            <div class="tab-content" id="tab-referral">
                <div class="referral-box">
                    <p style="margin-bottom:10px;">👥 Приглашай друзей и получай <strong style="color:var(--gold);">50 🪙</strong></p>
                    <div class="referral-link" id="refLink">Загрузка...</div>
                    <button class="btn-copy" id="copyRefLink">📋 Копировать</button>
                    <div style="margin-top:12px; font-size:13px; color:var(--text-muted);">
                        Приглашено: <strong id="refCountDisplay">0</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // === ИНИЦИАЛИЗАЦИЯ TELEGRAM WEB APP ===
        const tg = window.Telegram.WebApp;
        tg.expand();

        // === КОНФИГ ===
        const API_URL = 'https://telegram-clicker-red.vercel.app/api';
        const BOT_USERNAME = 'Clickertechtestbot';

        // === СОСТОЯНИЕ ===
        let state = {
            balance: 0,
            clickPower: 1,
            totalClicks: 0,
            autoPower: 0,
            refCount: 0,
            totalEarned: 0,
            achievements: [],
            skin: 'default',
            dailyBonusClaimed: false,
            lastDailyBonus: ''
        };
        let userId = tg.initDataUnsafe?.user?.id || 'anonymous';
        let isSaving = false;
        let autoInterval = null;

        // === DOM-ЭЛЕМЕНТЫ ===
        const loading = document.getElementById('loading');
        const game = document.getElementById('game');
        const balanceValue = document.getElementById('balanceValue');
        const balanceContainer = document.getElementById('balance');
        const clickPowerEl = document.getElementById('clickPower');
        const totalClicksEl = document.getElementById('totalClicks');
        const autoPowerEl = document.getElementById('autoPower');
        const refCountEl = document.getElementById('refCount');
        const refCountDisplay = document.getElementById('refCountDisplay');
        const levelBadge = document.getElementById('levelBadge');
        const levelProgress = document.getElementById('levelProgress');
        const levelProgressText = document.getElementById('levelProgressText');
        const clickBtn = document.getElementById('clickBtn');
        const coinEmoji = document.getElementById('coinEmoji');
        const dailyBonusBtn = document.getElementById('dailyBonus');
        const toast = document.getElementById('toast');
        const refLink = document.getElementById('refLink');

        // === TOAST ===
        function showToast(msg, duration = 2000) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), duration);
        }

        // === API ===
        async function loadData() {
            try {
                const res = await fetch(`${API_URL}?userId=${userId}`);
                if (!res.ok) throw new Error('Ошибка загрузки');
                const data = await res.json();
                state = { ...state, ...data };
                state.dailyBonusClaimed = data.dailyBonusClaimed === true || data.dailyBonusClaimed === 'true';
                state.achievements = data.achievements || [];
                const today = new Date().toDateString();
                if (state.lastDailyBonus === today) {
                    state.dailyBonusClaimed = true;
                } else {
                    state.dailyBonusClaimed = false;
                }
                updateUI();
                checkAchievements();
                startAutoClicker();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                const saved = localStorage.getItem(`clicker_${userId}`);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state = { ...state, ...parsed };
                    updateUI();
                    showToast('Загружено из кэша');
                }
            } finally {
                loading.style.display = 'none';
                game.style.display = 'block';
            }
        }

        async function saveData() {
            if (isSaving) return;
            isSaving = true;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        ...state
                    })
                });
                if (!res.ok) throw new Error('Ошибка сохранения');
                localStorage.setItem(`clicker_${userId}`, JSON.stringify(state));
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                localStorage.setItem(`clicker_${userId}`, JSON.stringify(state));
            } finally {
                isSaving = false;
            }
        }

        // === UI ===
        function updateUI() {
            balanceValue.textContent = Math.floor(state.balance);
            clickPowerEl.textContent = state.clickPower;
            totalClicksEl.textContent = state.totalClicks;
            autoPowerEl.textContent = state.autoPower;
            refCountEl.textContent = state.refCount;
            refCountDisplay.textContent = state.refCount;

            const level = calculateLevel(state.totalEarned);
            levelBadge.textContent = `🏅 Ур. ${level}`;
            const nextExp = getLevelExp(level);
            const currentExp = state.totalEarned;
            const prevExp = getLevelExp(level - 1);
            const progress = Math.min(((currentExp - prevExp) / (nextExp - prevExp)) * 100, 100);
            levelProgress.style.width = `${progress}%`;
            levelProgressText.textContent = `${Math.floor(currentExp - prevExp)} / ${Math.floor(nextExp - prevExp)}`;

            if (state.dailyBonusClaimed) {
                dailyBonusBtn.classList.add('claimed');
                dailyBonusBtn.textContent = '✅ Получен';
            } else {
                dailyBonusBtn.classList.remove('claimed');
                dailyBonusBtn.textContent = '🎁 Бонус';
            }

            coinEmoji.textContent = state.skin === 'gold' ? '🌟' : '🪙';

            renderAchievements();

            document.querySelectorAll('.shop-item-price').forEach(btn => {
                const priceText = btn.textContent.replace(/[^0-9]/g, '');
                const price = parseInt(priceText, 10);
                if (!isNaN(price)) {
                    btn.disabled = state.balance < price;
                }
            });
        }

        // === СИСТЕМА УРОВНЕЙ ===
        function calculateLevel(totalEarned) {
            let level = 1;
            while (totalEarned >= getLevelExp(level)) {
                level++;
            }
            return level;
        }

        function getLevelExp(level) {
            return Math.floor(100 * Math.pow(1.5, level - 1));
        }

        // === ДОСТИЖЕНИЯ ===
        const ACHIEVEMENTS = [
            { id: 'first_click', name: 'Первый шаг', desc: 'Сделай первый клик', icon: '👆', check: s => s.totalClicks >= 1 },
            { id: 'click_100', name: 'Трудоголик', desc: '100 кликов', icon: '💪', check: s => s.totalClicks >= 100 },
            { id: 'click_1000', name: 'Мастер клика', desc: '1000 кликов', icon: '🏆', check: s => s.totalClicks >= 1000 },
            { id: 'click_10000', name: 'Легенда', desc: '10000 кликов', icon: '👑', check: s => s.totalClicks >= 10000 },
            { id: 'balance_100', name: 'Копейщик', desc: '100 монет', icon: '💰', check: s => s.balance >= 100 },
            { id: 'balance_1000', name: 'Миллионер', desc: '1000 монет', icon: '💎', check: s => s.balance >= 1000 },
            { id: 'power_10', name: 'Силач', desc: 'Сила 10+', icon: '💥', check: s => s.clickPower >= 10 },
            { id: 'power_50', name: 'Гигант', desc: 'Сила 50+', icon: '⚡', check: s => s.clickPower >= 50 },
            { id: 'auto_10', name: 'Автоматчик', desc: '10 авто/сек', icon: '🤖', check: s => s.autoPower >= 10 },
            { id: 'ref_1', name: 'Лидер', desc: '1 реферал', icon: '👥', check: s => s.refCount >= 1 },
            { id: 'ref_5', name: 'Популярный', desc: '5 рефералов', icon: '🌟', check: s => s.refCount >= 5 },
            { id: 'level_10', name: 'Мастер', desc: '10 уровень', icon: '🎯', check: s => calculateLevel(s.totalEarned) >= 10 },
            { id: 'level_25', name: 'Легендарный', desc: '25 уровень', icon: '🔥', check: s => calculateLevel(s.totalEarned) >= 25 },
        ];

        function checkAchievements() {
            let unlocked = [];
            ACHIEVEMENTS.forEach(ach => {
                if (!state.achievements.includes(ach.id) && ach.check(state)) {
                    state.achievements.push(ach.id);
                    unlocked.push(ach);
                    const bonus = Math.floor(Math.random() * 40) + 10;
                    state.balance += bonus;
                    showToast(`🏆 ${ach.icon} ${ach.name} (+${bonus} 🪙)`, 3000);
                }
            });
            if (unlocked.length > 0) {
                saveData();
                updateUI();
                // Если вкладка достижений активна, перезапускаем анимацию
                const activeTab = document.querySelector('.tab.active');
                if (activeTab && activeTab.dataset.tab === 'achievements') {
                    animateTab('achievements');
                }
            }
        }

        function renderAchievements() {
            const list = document.getElementById('achievementsList');
            list.innerHTML = ACHIEVEMENTS.map(ach => {
                const unlocked = state.achievements.includes(ach.id);
                return `
                    <div class="achievement ${unlocked ? '' : 'locked'}">
                        <div class="achievement-icon">${ach.icon}</div>
                        <div class="achievement-info">
                            <div class="achievement-name">${unlocked ? '✅ ' : '🔒 '} ${ach.name}</div>
                            <div class="achievement-desc">${ach.desc}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // === АВТОКЛИКЕР ===
        function startAutoClicker() {
            if (autoInterval) clearInterval(autoInterval);
            if (state.autoPower > 0) {
                autoInterval = setInterval(() => {
                    state.balance += state.autoPower;
                    state.totalEarned += state.autoPower;
                    updateUI();
                    saveData();
                }, 1000);
            }
        }

        // === ЕЖЕДНЕВНЫЙ БОНУС ===
        async function claimDailyBonus() {
            if (state.dailyBonusClaimed) {
                showToast('❌ Уже получен сегодня!');
                return;
            }
            const bonus = 100 + calculateLevel(state.totalEarned) * 10;
            state.balance += bonus;
            state.totalEarned += bonus;
            state.dailyBonusClaimed = true;
            state.lastDailyBonus = new Date().toDateString();
            updateUI();
            await saveData();
            showToast(`🎁 +${bonus} 🪙! Завтра снова`, 3000);
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        // === РЕФЕРАЛЬНАЯ ССЫЛКА ===
        function generateRefLink() {
            import('https://cdn.jsdelivr.net/npm/base64-js@1.5.1/base64js.min.js')
                .then(module => {
                    const encoded = module.default.fromByteArray(new TextEncoder().encode(`${userId}:${Date.now()}`));
                    const code = encoded.slice(0, 16);
                    refLink.textContent = `https://t.me/${BOT_USERNAME}?start=ref_${code}`;
                })
                .catch(() => {
                    const fallback = btoa(`${userId}:${Date.now()}`).slice(0, 16);
                    refLink.textContent = `https://t.me/${BOT_USERNAME}?start=ref_${fallback}`;
                });
        }

        function copyRefLink() {
            const link = refLink.textContent;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => showToast('✅ Ссылка скопирована!'));
            } else {
                const ta = document.createElement('textarea');
                ta.value = link;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('✅ Ссылка скопирована!');
            }
        }

        // === МАГАЗИН ===
        function buyItem(cost, action, msg) {
            if (state.balance < cost) {
                showToast('❌ Недостаточно монет!');
                return;
            }
            state.balance -= cost;
            action();
            updateUI();
            saveData();
            showToast(msg);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            checkAchievements();
        }

        // === КЛИК ===
        function handleClick(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = (e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width/2) - rect.left;
            const y = (e.clientY || e.touches?.[0]?.clientY || rect.top + rect.height/2) - rect.top;
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.width = ripple.style.height = '40px';
            ripple.style.left = (x - 20) + 'px';
            ripple.style.top = (y - 20) + 'px';
            e.currentTarget.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);

            state.balance += state.clickPower;
            state.totalClicks += 1;
            state.totalEarned += state.clickPower;

            balanceContainer.classList.add('pop');
            setTimeout(() => balanceContainer.classList.remove('pop'), 150);

            const floatText = document.createElement('div');
            floatText.className = 'float-text';
            floatText.textContent = `+${state.clickPower}`;
            const coinSection = document.querySelector('.coin-section');
            coinSection.appendChild(floatText);
            setTimeout(() => floatText.remove(), 800);

            updateUI();
            saveData();
            checkAchievements();
        }

        // === АНИМАЦИЯ ПОЯВЛЕНИЯ ЭЛЕМЕНТОВ В ТАБАХ ===
        function animateTab(tabId) {
            const tabContent = document.getElementById(`tab-${tabId}`);
            if (!tabContent) return;
            let items;
            if (tabId === 'shop') {
                items = tabContent.querySelectorAll('.shop-item');
            } else if (tabId === 'achievements') {
                items = tabContent.querySelectorAll('.achievement');
            } else {
                return;
            }
            // Сначала скрываем все
            items.forEach(el => el.classList.remove('visible'));
            // С задержкой показываем каждый
            items.forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('visible');
                }, 80 * (index + 1));
            });
        }

        // === ФУНКЦИЯ ЗАКРЫТИЯ ВКЛАДКИ С АНИМАЦИЕЙ ===
        function closeTabWithAnimation(tabId) {
            const tabContent = document.getElementById(`tab-${tabId}`);
            if (!tabContent) return;

            // Если контент уже закрыт или закрывается, ничего не делаем
            if (!tabContent.classList.contains('active')) return;

            // Убираем активность с вкладки
            const tabBtn = document.querySelector(`.tab[data-tab="${tabId}"]`);
            if (tabBtn) tabBtn.classList.remove('active');

            // Добавляем класс closing для анимации закрытия
            tabContent.classList.remove('active');
            tabContent.classList.add('closing');

            // После завершения анимации (300ms) скрываем полностью
            setTimeout(() => {
                tabContent.classList.remove('closing');
                tabContent.style.display = 'none';
            }, 300);
        }

        // === ВКЛАДКИ (с поддержкой toggle и анимацией закрытия) ===
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabId = tab.dataset.tab;
                const isActive = tab.classList.contains('active');
                const tabContent = document.getElementById(`tab-${tabId}`);

                // Если вкладка активна — закрываем с анимацией
                if (isActive) {
                    closeTabWithAnimation(tabId);
                    return;
                }

                // Иначе: закрываем все остальные вкладки (с анимацией)
                document.querySelectorAll('.tab-content.active').forEach(tc => {
                    const activeTabId = tc.id.replace('tab-', '');
                    closeTabWithAnimation(activeTabId);
                });

                // Убираем активность со всех вкладок
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

                // Активируем выбранную вкладку
                tab.classList.add('active');

                // Показываем контент с анимацией появления
                tabContent.style.display = 'block';
                // Небольшая задержка, чтобы display успел примениться
                requestAnimationFrame(() => {
                    tabContent.classList.add('active');
                    // Запускаем анимацию для элементов (если это shop или achievements)
                    animateTab(tabId);
                });
            });
        });

        // === ИНИЦИАЛИЗАЦИЯ ===
        document.addEventListener('DOMContentLoaded', async () => {
            await loadData();

            clickBtn.addEventListener('click', handleClick);
            let holdInterval;
            const startHold = (e) => {
                holdInterval = setInterval(handleClick, 100);
            };
            const stopHold = () => clearInterval(holdInterval);
            clickBtn.addEventListener('mousedown', startHold);
            clickBtn.addEventListener('mouseup', stopHold);
            clickBtn.addEventListener('mouseleave', stopHold);
            clickBtn.addEventListener('touchstart', startHold);
            clickBtn.addEventListener('touchend', stopHold);
            clickBtn.addEventListener('touchcancel', stopHold);

            dailyBonusBtn.addEventListener('click', claimDailyBonus);

            document.getElementById('buyPower').addEventListener('click', () => {
                buyItem(50, () => state.clickPower += 1, '⚡ Сила +1');
            });
            document.getElementById('buyAuto').addEventListener('click', () => {
                buyItem(100, () => {
                    state.autoPower += 1;
                    startAutoClicker();
                }, '🤖 Автокликер +1');
            });
            document.getElementById('buySuperBoost').addEventListener('click', () => {
                buyItem(200, () => state.clickPower += 5, '🚀 Супер-буст +5');
            });
            document.getElementById('buyMegaBoost').addEventListener('click', () => {
                buyItem(1000, () => state.clickPower += 25, '💎 Мега-буст +25');
            });
            document.getElementById('buySkin').addEventListener('click', () => {
                buyItem(500, () => {
                    state.skin = state.skin === 'gold' ? 'default' : 'gold';
                }, state.skin === 'gold' ? '🎨 Скин снят' : '🎨 Золотой скин!');
            });

            generateRefLink();
            document.getElementById('copyRefLink').addEventListener('click', copyRefLink);

            tg.onEvent('viewportChanged', saveData);
            window.addEventListener('beforeunload', saveData);

            // Изначально никакая вкладка не активна
            updateUI();
            checkAchievements();
        });
    </script>
</body>
</html>
